; skate_lights firmware - Seeed XIAO ESP32-S3
;
; Build with the uv-pinned PlatformIO (see Makefile / README):
;   make setup && make build
;
; Milestone 1 hardware (MPU6050 + button + OLED) is intentionally NOT wired in
; yet for the v0 MVP. The deferred library deps are listed but commented so the
; build stays lean until that work begins. See docs/STATUS.md.

[env:seeed_xiao_esp32s3]
; Pinned for reproducibility (the uv.lock pins the Python side; this pins the
; embedded toolchain). Bump deliberately.
platform = espressif32@7.0.1
board = seeed_xiao_esp32s3
framework = arduino

monitor_speed = 115200
upload_speed = 921600

build_flags =
    -DCORE_DEBUG_LEVEL=1

lib_deps =
    fastled/FastLED@^3.7.0
    ; Deferred to Milestone 1 (motion + display):
    ; adafruit/Adafruit MPU6050@^2.2.6
    ; adafruit/Adafruit Unified Sensor@^1.1.14
    ; adafruit/Adafruit SSD1306@^2.5.13
